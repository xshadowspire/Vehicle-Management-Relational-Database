<!DOCTYPE html>
<html>
<head><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="container py-5">
    <div class="card p-4 shadow mx-auto" style="max-width: 500px;">
        <h2 class="text-warning mb-4 text-center">📝 Modifică Vehicul</h2>
        <form action="/update_vehicul" method="POST">
            <input type="hidden" name="id" value="{{v.idvehicul}}">
            <div class="mb-3"><label class="fw-bold">Marca</label><input type="text" name="m" value="{{v.marca}}" class="form-control"></div>
            <div class="mb-3"><label class="fw-bold">Model</label><input type="text" name="mo" value="{{v.model}}" class="form-control"></div>
            <div class="mb-3"><label class="fw-bold">Nr. Inmatriculare</label><input type="text" name="nr" value="{{v.nr_inmatriculare}}" class="form-control"></div>
            <div class="d-grid gap-2">
                <button class="btn btn-success fw-bold">💾 Salvează</button>
                <a href="/vehicule" class="btn btn-outline-secondary">Anulează</a>
            </div>
        </form>
    </div>
</body>
</html>
