<!DOCTYPE html>
<html>
<head><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="container py-5">
    <div class="card p-4 shadow mx-auto" style="max-width: 500px;">
        <h2 class="text-warning mb-4 text-center">📝 Modifică Șofer</h2>
        <form action="/update_sofer" method="POST">
            <input type="hidden" name="id" value="{{s.idsofer}}">
            <div class="mb-3"><label class="fw-bold">Nume</label><input type="text" name="n" value="{{s.nume}}" class="form-control"></div>
            <div class="mb-3"><label class="fw-bold">Prenume</label><input type="text" name="p" value="{{s.prenume}}" class="form-control"></div>
            <div class="mb-3"><label class="fw-bold">CNP</label><input type="text" name="c" value="{{s.cnp}}" class="form-control"></div>
            <div class="d-grid gap-2">
                <button class="btn btn-success fw-bold">💾 Salvează</button>
                <a href="/soferi" class="btn btn-outline-secondary">Anulează</a>
            </div>
        </form>
    </div>
</body>
</html>
